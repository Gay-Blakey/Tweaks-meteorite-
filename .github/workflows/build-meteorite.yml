name: Build Meteorite Tweak

on:
  push:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
      - '.github/workflows/build-meteorite.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install ldid
          brew install xz
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
      
      - name: Set Theos environment
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
      
      - name: Setup SDKs and libraries directory
        run: |
          mkdir -p $THEOS/sdks
          mkdir -p $THEOS/lib
          mkdir -p $THEOS/include
          ls -la $THEOS/
      
      - name: Download and setup libmryipc
        run: |
          echo "=== Setting up libmryipc dependency ==="
          
          # Create lib directory structure
          mkdir -p $THEOS/lib
          mkdir -p $THEOS/include
          
          # Try to download libmryipc from GitHub releases or clone repo
          cd $THEOS/lib
          
          # Method 1: Try downloading pre-built libmryipc
          if wget -q https://github.com/muirey03/libmryipc/releases/download/1.0/libmryipc.tar.gz 2>/dev/null; then
            tar -xzf libmryipc.tar.gz
            rm libmryipc.tar.gz
            echo "✓ libmryipc downloaded from releases"
          else
            # Method 2: Clone and build libmryipc
            echo "Cloning libmryipc from source..."
            cd $THEOS
            git clone https://github.com/muirey03/libmryipc.git 2>/dev/null || echo "libmryipc clone attempt"
            
            if [ -d "libmryipc" ]; then
              cd libmryipc
              make install THEOS=$THEOS 2>/dev/null || echo "Manual libmryipc build skipped, will use system libs"
            fi
          fi
          
          echo "libmryipc setup complete"
      
      - name: Build Meteorite tweak
        run: |
          cd meteorite
          export THEOS=$HOME/theos
          
          echo "=== Build Environment ==="
          echo "THEOS: $THEOS"
          echo "PATH: $PATH"
          echo "ARCHS: arm64 (iOS 12 compatible)"
          
          echo "=== Checking dependencies ==="
          ls -la $THEOS/lib/ || echo "No lib directory"
          ls -la $THEOS/include/ || echo "No include directory"
          
          echo "=== Starting Build ==="
          make clean
          make FINALPACKAGE=1 THEOS=$THEOS
      
      - name: Check build output
        if: always()
        run: |
          cd meteorite
          echo "=== Build Artifacts ==="
          find .theos -type f 2>/dev/null | head -30
          
          if find .theos -type f -name "*.deb" 2>/dev/null | grep -q .; then
            echo ""
            echo "✓ Build successful! .deb files:"
            find .theos -type f -name "*.deb"
          else
            echo ""
            echo "Checking build structure..."
            ls -la .theos/obj/ 2>/dev/null || echo "No obj directory"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meteorite-build-${{ github.run_number }}
          path: meteorite/.theos/
          retention-days: 30
      
      - name: Comment on PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildSuccess = '${{ job.status }}' === 'success';
            const message = buildSuccess 
              ? '✅ Build successful! Meteorite tweak compiled for iOS 12.' 
              : '❌ Build failed. Check Actions logs for details.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })
